<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script>const SCRIPT_URL='<?= ScriptApp.getService().getUrl(); ?>';</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대웅제약 오프라인 채널 채권 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@400;600;700&family=Nanum+Square+Round:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --dw-orange:#F5A623;--dw-orange2:#E8941A;--dw-gray:#4A4A4A;--dw-gray2:#6B6B6B;
  --bg:#F7F7F7;--surface:#FFFFFF;--border:#E0E0E0;--border2:#CCCCCC;
  --text:#1A1A1A;--text2:#4A4A4A;--text3:#9B9B9B;
  --font-title:'Black Han Sans',sans-serif;--font-sans:'Noto Sans KR',sans-serif;--font-mono:'Montserrat',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;display:flex;flex-direction:column;}
.main-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 24px;}
.main-eyebrow{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:12px;font-family:var(--font-mono);}
.main-heading{font-size:28px;font-weight:400;color:#1A1A1A;font-family:var(--font-title);letter-spacing:-.5px;margin-bottom:8px;text-align:center;}
.main-heading span.main-heading-wrap{background:rgba(245,166,35,.18);border-radius:4px;padding:0 4px;}
.main-heading span.hl{color:var(--dw-orange);}
.main-sub{font-size:13px;color:var(--text3);margin-bottom:48px;text-align:center;line-height:1.7;}
.nav-cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:680px;width:100%;}
.nav-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  padding:32px 28px;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;
  display:flex;flex-direction:column;gap:10px;
}
.nav-card:hover{border-color:var(--dw-orange);box-shadow:0 8px 28px rgba(245,166,35,.15);transform:translateY(-2px);}
.nav-card-icon{font-size:32px;line-height:1;}
.nav-card-label{font-size:18px;font-weight:700;color:var(--dw-gray);font-family:'Nanum Square Round',sans-serif;letter-spacing:-.3px;}
.nav-card-desc{font-size:12px;color:var(--text3);line-height:1.7;}
.nav-card-arrow{font-size:20px;color:var(--dw-orange);margin-top:auto;padding-top:8px;}
@media(max-width:580px){.nav-cards{grid-template-columns:1fr;}.main-heading{font-size:22px;}}
</style>
</head>
<body>
<div class="main-wrap">
  <div class="main-eyebrow">DW Offline Channel AR Dashboard</div>
  <div class="main-heading"><span class="main-heading-wrap">대웅제약 <span class="hl">오프라인 채널</span> 채권 현황</span></div>
  <div class="main-sub">아래에서 확인할 메뉴를 선택하세요.</div>
  <div class="nav-cards">
    <a class="nav-card" id="detailBtn" href="#">
      <div class="nav-card-icon">📋</div>
      <div class="nav-card-label">오늘의 채권 현황</div>
      <div class="nav-card-desc">당일 기준 판매처별 채권 상세 내역<br>사업부별 · 사무소별 · 담당자별 채권 조회</div>
      <div class="nav-card-arrow">→</div>
    </a>
    <a class="nav-card" id="summaryBtn" href="#">
      <div class="nav-card-icon">📊</div>
      <div class="nav-card-label">월별 채권 현황</div>
      <div class="nav-card-desc">매월 말일 기준 채권 추이 분석<br>월별 · 사업부별 · 사무소별 핵심지표 Summary</div>
      <div class="nav-card-arrow">→</div>
    </a>
  </div>
</div>
<script>
document.getElementById('detailBtn').onclick=e=>{
  e.preventDefault();
  window.top.location.href=SCRIPT_URL.split('?')[0]+'?page=index';
};
document.getElementById('summaryBtn').onclick=e=>{
  e.preventDefault();
  window.top.location.href=SCRIPT_URL.split('?')[0]+'?page=summary';
};
</script>
</body>
</html>
